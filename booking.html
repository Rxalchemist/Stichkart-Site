<!DOCTYPE html>
<html>
<head>
<title>Book Tailor - Stichkart</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
}

button{
background:black;
color:white;
padding:15px;
border:none;
width:100%;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<h2>Book Your Tailor</h2>

<form>

<label>Name</label>
<input type="text">

<label>Phone</label>
<input type="text">

<label>Clothing Type</label>
<select>
<option>Blouse</option>
<option>Kurti</option>
<option>Suit</option>
<option>Lehenga</option>
<option>Custom Design</option>
</select>

<label>Upload Reference Design</label>
<input type="file">

<label>Measurements / Notes</label>
<textarea></textarea>

<label>Delivery Date</label>
<input type="date">

<button>Confirm Booking</button>

</form>

</div>

</body>
</html>
